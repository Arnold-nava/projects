    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>inputs</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
            <h1>College Enrollment Form</h1>
            <form action="">
                <table>
                    
                    <td colspan="2"><h2>INFORMATION</h2></td>
                    <tr>
                        <td>
                            <p>First Name*</p>
                        </td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Middle Name*</label>
                        </td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Last Name*</label>
                        </td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Birthday*</label>
                        </td>
                        <td>
                            <input type="date">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Birthplace*</label>
                        </td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Age*</label>
                        </td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Year Level*</label>
                        </td>
                        <td>
                            <select>
                                <option>Select Year Level</option>
                                <option>1st Year</option>
                                <option>2nd Year</option>
                                <option>3rd Year</option>
                                <option>4th Year</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Course*</label>
                        </td>
                        <td>
                            <select>
                                <option>Select Courser</option>
                                <option>ACT (Associate in Computer Technology)</option>
                                <option>BSOA (Business Office Administration)</option>
                                <option>ENTREO (Entrepreneurhsip)</option>
                                <option>HM (Hospitality Management)</option>
                                <option>CT (Computer Technology)</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Citizenship*</label>
                        </td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Sex*</label>
                        </td>
                        <td>
                            <input type="radio" name="gender">
                            <label for="">Male</label>
                            <input type="radio" name="gender">
                            <label for="">Female</label>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Civil Statur*</label>
                        </td>
                        <td>
                            <select>
                                <option>Single</option>
                                <option>Married</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Region*</label>
                        </td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Province*</label>
                        </td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>City*</label>
                        </td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Barangay*</label>
                        </td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>House No./ Street*</label>
                        </td>
                        <td>    
                            <input type="text">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Contact No.*</label>
                        </td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>
                    
                    <td colspan="2"><h2 class="cred">CREDENTIALS</h2></td>

                    <tr>
                        <td rowspan="2" style="vertical-align: top"> 
                            <p>Credential Submitted*</p>
                        </td>
                        <td>
                            <input type="checkbox"> Form-138 (High School Card)<br>
                            <input type="checkbox"> Form-137<br>
                            <input type="checkbox"> Birth Certificate<br>
                            <input type="checkbox"> Good Moral Certification<br>
                            <input type="checkbox"> Certificate of Transfer Credentials<br>
                            <input type="checkbox"> Transcript of Records<br>
                            <input type="checkbox"> Summer Permit / Permit to Cross Enroll<br>
                            <input type="checkbox"> Picture<br>
                            <input type="checkbox"> PSA / NSO<br>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <input id="button" class="submit" type="submit" value="Submit">
                            <input id="button" class="reset" type="reset" value="Reset">
                        </td>
                    </tr>
                
                </table>
            </form>
    </body>
    </html>
